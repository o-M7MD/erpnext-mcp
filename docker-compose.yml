services:
  erpnext-mcp:
    build: .
    restart: unless-stopped
    ports:
      - "8000"
    volumes:
      - ./config.json:/app/config.json
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - global-proxy
      - frappe_docker_default

networks:
  global-proxy:
    external: true
  frappe_docker_default:
    external: true
