services:
  erpnext-mcp:
    build: .
    container_name: erpnext-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./config.json:/app/config.json:ro
